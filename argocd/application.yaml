apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: user-order-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Sriram77805/Cloud-Native-User-Order-Platform
    targetRevision: main
    path: helm/user-order-platform
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
